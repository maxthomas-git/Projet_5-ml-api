name: ML API CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install -U pip
          pip install pytest fastapi uvicorn pandas scikit-learn sqlalchemy psycopg2-binary joblib httpx

      - name: Set CI environment
        run: echo "CI=true" >> $GITHUB_ENV

      - name: Set PYTHONPATH
        run: echo "PYTHONPATH=$PWD" >> $GITHUB_ENV

      - name: Run tests
        run: pytest


  deploy_space:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install git-lfs
        run: |
          sudo apt-get update
          sudo apt-get install git-lfs -y
          git lfs install

      - name: Configure Git
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: Clone Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          git clone --depth=1 https://oauth2:${HF_TOKEN}@huggingface.co/spaces/maximilien777/Projet5_ml_api space
          cd space
          git lfs install
          git lfs pull

      - name: Sync project to Space
        run: |
          find space -mindepth 1 -delete

          # API + MODEL
          cp -r ./models space/
          cp -r ./app space/

          # uv project files
          cp ./pyproject.toml space/

      - name: Commit and push to Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          cd space

          git remote add hf https://oauth2:${HF_TOKEN}@huggingface.co/spaces/maximilien777/Projet5_ml_api

          git add .
          git commit -m "Auto deploy from GitHub Actions" || exit 0

          git push hf main --force
